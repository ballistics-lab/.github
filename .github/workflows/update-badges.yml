name: Update custom badges

on:
  push:
    branches: [main]
    paths:
      - '.github/workflow/update-badges.yml'
      - 'scripts/badges.py'
      - 'badges.json'
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv with all available options
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          python-version: "3.14"

      - name: Update badges
        run: uv run --script scripts/badges.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges.json
          git diff --cached --quiet || git commit -m "chore: sync profile README to root"
          git push
