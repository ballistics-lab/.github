name: Sync README to profile

on:
  push:
    branches: [main]
    paths:
      - 'profile/README.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync profile/README.md into root README.md
        run: cp profile/README.md README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: sync profile README to root"
          git push
